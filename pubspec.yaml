name: foodtok
description: "MakanMap - Community halal food intelligence powered by AI."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  url_launcher: ^6.2.5
  # ---------- FLUTTER ----------
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ---------- FIREBASE ----------
  firebase_core: ^2.30.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0

  # ---------- GOOGLE MAPS ----------
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0        # For "Near Me" button GPS
  geocoding: ^3.0.0          # Convert coordinates to address

  # ---------- NETWORK / AI ----------
  http: ^1.2.2               # Gemini API calls

  # ---------- UTILITIES ----------
  intl: ^0.19.0              # Date formatting
  uuid: ^4.4.0               # Generate video IDs
  collection: ^1.18.0        # Safer map operations

  # ---------- UI / UX ----------
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.1    # Better loaders
  modal_bottom_sheet: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true